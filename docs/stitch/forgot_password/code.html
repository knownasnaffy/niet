<h1 class="font-display-md text-display-md text-ink font-bold mb-xs">Forgot Password?</h1>
<p class="font-caption-md text-caption-md text-secondary max-w-[320px]">
                            Enter your institutional email address and we'll send you a link to reset your password.
                        </p>
</div>
<!-- Reset Form -->
<form action="#" class="space-y-xl">
<div class="space-y-xxs">
<label class="font-caption-bold text-caption-bold text-ink block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-steel text-xl" data-icon="mail">mail</span>
<input class="w-full h-11 pl-[44px] pr-md bg-canvas border border-steel rounded-[4px] focus:ring-0 focus:border-ink font-body-md text-body-md transition-all placeholder:text-secondary/50" id="email" placeholder="name@niet.edu" required="" type="email"/>
</div>
</div>
<button class="w-full h-[44px] bg-primary hover:bg-primary-deep text-on-ink font-button-md text-button-md uppercase rounded-[4px] transition-colors flex items-center justify-center gap-xs" type="submit">
                            Send Reset Link
                        </button>
</form>
<!-- Secondary Action -->
<div class="mt-xl pt-xl border-t border-fog text-center">
<a class="inline-flex items-center gap-xs font-button-md text-button-md text-primary hover:text-primary-deep transition-colors" href="/login">
<span class="material-symbols-outlined text-lg" data-icon="arrow_back">arrow_back</span>

                        </a>
</div>
