    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        vertical-align: middle;
      }
      .chevron-bg {
        clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
      }
    </style>

  <body
    class="bg-cloud min-h-screen flex items-center justify-center p-md md:p-section font-body-md text-on-surface selection:bg-primary-soft selection:text-primary-deep"
  >
    <!-- Main Container -->
    <main
      class="w-full max-w-max-width bg-canvas rounded-xl shadow-soft-lift overflow-hidden flex flex-col md:flex-row min-h-[700px]"
    >
      <!-- Left Side: Visual/Branding -->
      <section
        class="hidden md:flex md:w-1/2 bg-ink relative overflow-hidden items-center justify-center"
      >
        <img
          alt="Modern University Library"
          class="absolute inset-0 w-full h-full object-cover opacity-60"
          data-alt="An expansive, ultra-modern university library featuring multi-level glass balconies and minimalist white bookshelves. The architecture is defined by clean lines and high ceilings with natural light flooding through skylights, creating a bright and efficient academic atmosphere. The overall aesthetic is professional and commercial-clean, utilizing a palette of stark whites and deep blacks to emphasize a high-end corporate learning environment. Soft, diffuse shadows and high-key lighting enhance the serene yet technologically advanced mood."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-jBbOWK0B0umCCa07UtD1yuqQ3eFz5XOLZjDlU0S1gFXrA-yN9TBVZqzl8WIM5O85biP3N9Z4J2fpkGx5AbaMjVOKU4hITAxEJ_gtA7npOMFVyw_Wf36u-xHHklzJMUZcmcuPcRkh1LGR_PcOravH-zPA5rVYTIbs5rjE6U4UiC4REpCAhWB9qwtLh35z1yVqXuo6Q4SSNp1DdYdcsfh9gfpsGHdAdwrOpdgCCGj3rfaF58CuGk6a6WlltBrvz--qY-ZUYyrodge_"
        />
        <!-- Signature Chevron Motif -->
        <div
          class="absolute inset-0 pointer-events-none z-10 opacity-30 flex items-center justify-center"
        >
          <div
            class="chevron-bg bg-primary w-48 h-full absolute -left-12 rotate-12"
          ></div>
          <div
            class="chevron-bg bg-primary w-24 h-full absolute -left-4 translate-x-32 rotate-12"
          ></div>
        </div>
        <div class="relative z-20 px-xxl text-center">
          <div class="mb-xl">
            <span
              class="font-display-xl text-display-xl font-bold text-on-ink tracking-tight"
              >NIET Portal</span
            >
          </div>
          <p
            class="font-body-lg text-body-lg text-on-ink opacity-90 max-w-md mx-auto"
          >
            The centralized gateway for academic excellence, administrative
            efficiency, and institutional growth.
          </p>
        </div>
      </section>
      <!-- Right Side: Login Form -->
      <section
        class="w-full md:w-1/2 flex flex-col justify-between p-xl md:p-xxl bg-canvas"
      >
        <!-- Logo Header (Mobile) -->
        <div class="md:hidden mb-xl flex items-center gap-xs">
          <span class="font-display-md text-display-md font-bold text-primary"
            >NIET Portal</span
          >
        </div>
        <div class="max-w-md w-full mx-auto my-auto">
          <header class="mb-xxl text-left">
            <h1
              class="font-display-sm text-display-sm font-bold text-ink mb-xs"
            >
              Welcome Back
            </h1>
            <p class="font-body-md text-body-md text-secondary">
              Sign in to access your academic dashboard
            </p>
          </header>
          <!-- User Type Toggle -->
          <div class="bg-cloud p-xxs rounded-lg flex mb-xl">
            <button
              class="flex-1 py-xs text-button-md font-button-md rounded-md bg-canvas text-primary shadow-soft-lift transition-all"
            >
              Student
            </button>
            <button
              class="flex-1 py-xs text-button-md font-button-md text-secondary hover:text-ink transition-colors"
            >
              Faculty
            </button>
          </div>
          <form class="space-y-xl">
            <!-- Email/ID Field -->
            <div class="space-y-xxs">
              <label
                class="font-caption-bold text-caption-bold text-ink"
                for="email"
                >Institutional Email / ID</label
              >
              <div class="relative">
                <input
                  class="w-full h-11 px-md border border-steel rounded-md focus:ring-0 focus:border-ink transition-colors outline-none font-body-md text-ink placeholder:text-secondary-fixed-dim"
                  id="email"
                  placeholder="e.g. s.johndoe@niet.edu"
                  type="email"
                />
              </div>
            </div>
            <!-- Password Field -->
            <div class="space-y-xxs">
              <div class="flex justify-between items-center">
                <label
                  class="font-caption-bold text-caption-bold text-ink"
                  for="password"
                  >Password</label
                >
                <a
                  class="font-caption-md text-caption-md text-primary hover:text-primary-deep font-semibold"
                  href="#"
                  >Forgot password?</a
                >
              </div>
              <div class="relative">
                <input
                  class="w-full h-11 px-md border border-steel rounded-md focus:ring-0 focus:border-ink transition-colors outline-none font-body-md text-ink placeholder:text-secondary-fixed-dim pr-10"
                  id="password"
                  placeholder="••••••••"
                  type="password"
                />
                <button
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-ink"
                  type="button"
                >
                  <span class="material-symbols-outlined" data-icon="visibility"
                    >visibility</span
                  >
                </button>
              </div>
            </div>
            <!-- Remember Me -->
            <div class="flex items-center gap-xs">
              <input
                class="w-4 h-4 rounded border-steel text-primary focus:ring-primary transition-all"
                id="remember"
                type="checkbox"
              />
              <label
                class="font-caption-md text-caption-md text-secondary cursor-pointer select-none"
                for="remember"
                >Remember me for 30 days</label
              >
            </div>
            <!-- Submit CTA -->
            <button
              class="w-full h-11 bg-primary hover:bg-primary-deep text-on-primary font-button-md text-button-md uppercase rounded transition-all shadow-soft-lift flex items-center justify-center gap-xs px-xl"
              type="submit"
            >
              Sign In
              <span class="material-symbols-outlined" data-icon="arrow_forward"
                >arrow_forward</span
              >
            </button>
          </form>
        </div>
        <!-- Footer Section -->
        <footer class="mt-xxl pt-xl border-t border-fog text-center">
          <p class="font-caption-md text-caption-md text-secondary">
            Don't have an account?
            <a
              class="text-primary hover:text-primary-deep font-bold underline underline-offset-4 decoration-primary-soft"
              href="#"
              >Contact IT Support</a
            >
          </p>
          <div
            class="mt-md flex justify-center gap-xl text-caption-sm text-secondary opacity-60"
          >
            <a class="hover:opacity-100" href="#">Privacy Policy</a>
            <a class="hover:opacity-100" href="#">Terms of Service</a>
            <a class="hover:opacity-100" href="#">Help Center</a>
          </div>
        </footer>
      </section>
    </main>
    <!-- Background Decorative Elements -->
    <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
      <div
        class="absolute top-0 right-0 w-[40vw] h-[409px] bg-primary opacity-[0.03] blur-[120px]"
      ></div>
      <div
        class="absolute bottom-0 left-0 w-[40vw] h-[409px] bg-bloom-coral opacity-[0.02] blur-[120px]"
      ></div>
