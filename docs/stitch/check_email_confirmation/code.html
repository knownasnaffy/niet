  <body
    class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center"
  >
    <div
      class="w-full max-w-max-width mx-auto flex flex-col min-h-screen relative overflow-hidden"
    >
      <!-- Architectural Brand Signal (Chevron) Left -->
      <div class="absolute top-1/2 left-0 -translate-y-1/2 hidden lg:block">
        <div
          class="w-[40px] h-[300px] bg-primary transform -skew-x-[20deg] opacity-10"
        ></div>
      </div>
      <!-- Architectural Brand Signal (Chevron) Right -->
      <div class="absolute top-1/2 right-0 -translate-y-1/2 hidden lg:block">
        <div
          class="w-[40px] h-[300px] bg-primary transform -skew-x-[20deg] opacity-10"
        ></div>
      </div>
      <main
        class="flex-grow flex items-center justify-center px-xl py-section z-10"
      >
        <div
          class="w-full max-w-[480px] bg-canvas p-xxl rounded-xl shadow-[0_2px_8px_rgba(26,26,26,0.08)] flex flex-col items-center text-center"
        >
          <!-- Logo Anchor -->
          <div class="mb-xxl">
            <span class="font-display-md text-display-md font-bold text-primary"
              >NIET Portal</span
            >
          </div>
          <!-- Success State Illustration / Icon -->
          <div
            class="relative w-24 h-24 bg-surface-container-low rounded-full flex items-center justify-center mb-xl"
          >
            <div
              class="absolute inset-0 bg-primary opacity-5 rounded-full animate-pulse"
            ></div>
            <span
              class="material-symbols-outlined text-[48px] text-primary"
              data-icon="mark_email_read"
              >mark_email_read</span
            >
          </div>
          <!-- Content Header -->
          <h1 class="font-display-sm text-display-sm font-bold text-ink mb-sm">
            Check your email
          </h1>
          <p
            class="font-caption-md text-caption-md text-secondary mb-xxl max-w-[340px]"
          >
            We've sent password reset instructions to your email address. Please
            check your inbox.
          </p>
          <!-- Actions Section -->
          <div class="w-full space-y-xl">
            <!-- Resend Action -->
            <div class="p-md bg-cloud rounded-lg border border-fog">
              <p class="font-caption-md text-caption-md text-charcoal mb-xs">
                Didn't receive the email?
              </p>
              <button
                class="font-button-md text-button-md text-primary font-bold hover:text-primary-deep transition-colors flex items-center justify-center mx-auto gap-xs"
              >
                <span
                  class="material-symbols-outlined text-[18px]"
                  data-icon="refresh"
                  >refresh</span
                >
                CLICK TO RESEND
              </button>
            </div>
            <!-- Return to Login Button -->
            <div class="pt-md border-t border-fog">
              <a
                class="w-full h-[44px] bg-ink hover:bg-ink-deep text-on-ink font-button-md text-button-md flex items-center justify-center px-xl rounded-[4px] transition-all uppercase tracking-wider"
                href="#"
              >
                Back to Login
              </a>
            </div>
          </div>
          <!-- Help Link -->
          <div class="mt-xxl">
            <a
              class="font-caption-md text-caption-md text-graphite hover:text-ink transition-colors underline flex items-center gap-xs"
              href="#"
            >
              <span
                class="material-symbols-outlined text-[16px]"
                data-icon="help_outline"
                >help_outline</span
              >
              Contact IT Support
            </a>
          </div>
        </div>
      </main>
      <!-- Minimal Transactional Footer -->
      <footer
        class="w-full py-xl px-xl flex flex-col md:flex-row justify-center items-center gap-md max-w-max-width mx-auto border-t border-fog mt-auto bg-canvas"
      >
        <p class="font-caption-sm text-caption-sm text-secondary">
          © 2024 NIET Institutional Portal. All rights reserved.
        </p>
        <div class="flex gap-xl">
          <a
            class="font-caption-sm text-caption-sm text-secondary hover:text-primary transition-colors"
            href="#"
            >Privacy Policy</a
          >
          <a
            class="font-caption-sm text-caption-sm text-secondary hover:text-primary transition-colors"
            href="#"
            >Terms of Service</a
          >
        </div>
      </footer>
